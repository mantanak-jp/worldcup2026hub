<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>チーム詳細 - WorldCup2026Hub</title>
    <link rel="stylesheet" href="detail.css">
  </head>
  <body data-page="team">
    <header class="topbar">
      <a href="index.html">WorldCup2026Hub</a>
      <span>チーム詳細</span>
    </header>

    <main class="detail-shell" data-detail-shell>
      <section class="detail-hero">
        <p class="eyebrow" data-team-group>Group A</p>
        <h1 data-team-name>Canada</h1>
        <p data-team-meta>CONCACAF / profile draft</p>
      </section>

      <section class="panel-grid" aria-label="チーム詳細セクション">
        <article class="panel">
          <p class="eyebrow">チームステータス</p>
          <h2 data-team-status>出場決定</h2>
          <p data-team-profile-status>プロフィール準備中</p>
        </article>

        <article class="panel">
          <p class="eyebrow">試合</p>
          <h2>関連試合</h2>
          <ul class="source-list" data-team-matches></ul>
        </article>

        <article class="panel panel-wide">
          <p class="eyebrow">参照ソース</p>
          <h2>出典</h2>
          <ul class="source-list" data-source-list></ul>
        </article>

        <article class="panel panel-wide">
          <p class="eyebrow">更新</p>
          <h2>更新履歴</h2>
          <ul class="source-list" data-update-history></ul>
        </article>
      </section>
    </main>

    <script src="detail.js"></script>
  </body>
</html>
